# Starship configuration
# See: https://starship.rs/

# Single-line display format
format = """
$directory\
$git_branch\
$git_status\
$gcloud\
$kubernetes\
$character
"""

# Do not add newline
add_newline = false

[directory]
truncation_length = 0
truncate_to_repo = false
home_symbol = "~"
format = "[$path]($style) "
style = "#808080"
read_only = " "

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "green"
truncation_length = 20
truncation_symbol = "…"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "yellow"
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "📦"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[kubernetes]
disabled = false
format = '[\($context:$namespace\)]($style) '
style = "cyan"

[gcloud]
format = '[\($project\)]($style) '
style = "cyan"

[character]
success_symbol = "[>](white)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold green)"
